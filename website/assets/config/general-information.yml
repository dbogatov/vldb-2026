index:
  content: |
    # VLDB 2026: Overview

    The Very Large Data Bases (VLDB) is a premier annual international forum for data management, scalable data science, and database researchers, vendors, practitioners, application developers, and users.
    The forthcoming VLDB 2026 conference is poised to deliver a comprehensive program, featuring an array of research talks, keynote and invited talks, panels, tutorials, demonstrations, industrial tracks, and workshops.
    It will cover a spectrum of research topics related to all aspects of data management, where systems issues play a significant role, such as data management system technology and information management infrastructures, including their very large scale of experimentation, novel architectures, and demanding applications as well as their underpinning theory.

    Key areas of interest for PVLDB include, but are not limited to, data mining and analytics, data privacy and security, database engines, database performance and manageability, distributed database systems, graph and network data, information integration and data quality, languages, machine learning, ai, and databases, novel database architectures, provenance and workflows, specialized and domain-specific data management, text and semi-structured data, and user interfaces.
    These thematic pillars represent the foundational elements underpinning the technological landscape of the emerging applications of the 21st century.

    The VLDB 2026 conference will take place from Aug 31st to 4th September, 2026 in Boston, MA, USA.

  twitter: VLDBconf

registration:
  title: "VLDB 2026: Registration"
  intro:
    - Each research or industrial paper must have an author registration, even if the paper is presented by a student. The author registration refers to a Professional "Conference-Only" or "Workshop+Conference" registration. If an author has more than one paper, they will only need to pay for one author registration, which may cover multiple papers.
    - Each workshop paper must also have an author registration, even if the paper is presented by a student. The author registration refers to a Professional "Two-Day Workshop" or "Workshop+Conference" registration. If an author has more than one workshop paper, they will only need to pay for one author registration, which may cover multiple workshop papers.
  registration_url: https://vldb2026.fix.events/
  contact_email: info@fix.events
  fees:
    currency_note: All fees are listed in USD.
    notes:
      - Professional conference tickets include lunch, coffee and tea breaks, and access to the banquet.
      - Participants attending conference workshops will also receive lunch and coffee and tea breaks.
      - Discounted student conference tickets include lunch, coffee and tea breaks, and access to the banquet.
      - Student participants attending conference workshops will also receive lunch and coffee and tea breaks.
    periods:
      - title: Early Bird
        deadline: by July 12
        professional_label: Professional
        student_label: Student
        rows:
          - label: Conference + Workshops
            date_range: Aug 31 - Sep 4
            professional: $1200
            student: $600
          - label: Conference Only
            date_range: Sep 1 - Sep 3
            professional: $1050
            student: $500
          - label: 2-Day Workshops
            date_range: Aug 31 and Sep 4
            professional: $300
            student: $150
      - title: Regular
        deadline: by August 29
        professional_label: Professional
        student_label: Student
        rows:
          - label: Conference + Workshops
            date_range: Aug 31 - Sep 4
            professional: $1450
            student: $750
          - label: Conference Only
            date_range: Sep 1 - Sep 3
            professional: $1300
            student: $650
          - label: 2-Day Workshops
            date_range: Aug 31 and Sep 4
            professional: $400
            student: $200
    additional_tickets:
      title: Additional Ticket
      rows:
        - label: Extra Banquet Ticket
          date_range: Sep 2
          deadline: Register by July 27
          price: $150
  sections:
    - title: Registration Process
      paragraphs:
        - The registration desk's location will be updated soon.
        - Attendees are encouraged to collect their conference badge as early as possible to ensure smooth access to the Conference Welcome Address and the start of the event.
        - If your registration fee has not been paid prior to arrival, you will be asked to complete the payment at the registration desk. All pending balances must be settled when registering at the conference. To avoid delays, please plan to arrive early.
    - title: Return and Refund Policy
      paragraphs:
        - "Conference registrations may be cancelled under the following conditions: full refunds are available up to 60 days before the conference. Cancellations made up to 30 days before the conference are eligible for a 50% refund. No refunds will be issued for cancellations made within 30 days of the conference. Refunds will be processed after the event using the original payment method."
    - title: Privacy Policy
      paragraphs:
        - Personal data collected during registration will be used solely for the purposes of event organization, registration processing, communication, and access control for VLDB 2026. Data will be handled securely and in accordance with applicable data protection laws and will not be shared with third parties except where required for event delivery or legal obligations.
    - title: Legal Notice
      paragraphs:
        - Attendance at VLDB 2026 is limited to participants 16 years of age or older. Participants under 16 must be accompanied by a registered adult. Attendees are responsible for their own travel, health, and accident insurance. VLDB 2026 and event organizers accept no liability for personal injury, loss, or damage to property. By attending, you consent to photography and videography for promotional purposes. In cases of force majeure, the organizers reserve the right to modify or cancel the event without liability.
    - title: Insurance, Release and Waiver of Liability
      paragraphs:
        - Participants are strongly advised to obtain appropriate travel, health, and accident insurance prior to departing from their country of residence.
        - VLDB2026, as the event organizer, shall not be held liable for any personal injury, loss, or damage to personal property belonging to conference participants or their accompanying persons during the course of the event.
        - All registrants are responsible for informing themselves of and complying with applicable local laws and regulations during their participation in the conference.
    - title: Force Majeure
      paragraphs:
        - VLDB2026, and the event venue shall not be held responsible for the partial or total non-performance of their obligations under the contract in circumstances beyond their reasonable control. Such circumstances include, but are not limited to, accidents, natural disasters (whether threatened or actual), war, interruption or curtailment of transportation services, threats or acts of terrorism, governmental travel advisories related to security concerns, labor disputes including strikes or lockouts, civil unrest, the issuance of a Travel Warning by the World Health Organization, or any other event that makes it impossible for the venue or hotel to accommodate conference participants, or that results in the cancellation of the event by VLDB2026.
        - In the occurrence of any such event, the Organizers may, at their sole discretion, refund all or part of the delegate registration fee and/or service charges paid by a Delegate or Exhibitor. However, the Organizers shall not be obligated to reimburse the full amount of such fees or charges. Furthermore, the Organizers shall bear no liability toward any Delegate or Exhibitor for claims, damages, losses (including consequential losses), costs, or expenses that may arise as a result of such circumstances.
    - title: Photography and Videography Disclosure
      paragraphs:
        - By registering for and attending the Conference, participants grant permission to VLDB2026 to capture and use their image or likeness in photographs, video recordings, or other media. These materials may be used in publications, promotional content, presentations, and digital platforms, including websites, without compensation or additional consideration.
        - VLDB2026 reserves the right to edit, reproduce, publish, distribute, or display such materials for the purpose of promoting VLDB2026 activities or for any other lawful purpose. Participants waive any right to review or approve the final version of these materials, whether in print or electronic format, in which their likeness may appear. All such photographs and recordings shall become the property of VLDB2026.
    - title: Letters of Invitation
      paragraphs:
        - Invitation letters for visa purposes may be issued upon request to delegates who have completed and paid their conference registration.
        - Requests can be submitted through the registration portal, where applicants will be asked to provide the required passport information. Please allow 2-3 business days after payment for the processing of invitation letter requests.
        - Please note that the issuance of a visa invitation letter does not imply any financial responsibility or other obligation on the part of VLDB2026.
        - For assistance or questions regarding letters of invitation for visa purposes, please contact the Conference Manager at info@fix.events

venue:
  title: "VLDB 2026: Conference Venue"
  venue_name: The Westin Boston Seaport District - Boston, USA
  intro:
    - The 52nd International Conference on Very Large Data Bases (VLDB 2026) will take place in Boston, Massachusetts, at The Westin Boston Seaport District, located in the heart of the city's vibrant Seaport neighborhood.
    - The Westin Boston Seaport District provides a modern and comfortable setting for the conference, offering spacious guest rooms and flexible meeting spaces designed for large international events. Staying at the conference hotel allows attendees to enjoy convenient access to all sessions and activities throughout the week.
  sections:
    - title: Accommodation
      paragraphs:
        - A special VLDB room block with preferred conference rates will be available at The Westin Boston Seaport District. Attendees are strongly encouraged to stay at the conference venue for the most convenient experience.
        - "As part of the conference agreement, the hotel's daily destination fee (normally $30) will be waived for VLDB attendees."
        - The hotel is also home to several excellent spaces and amenities, making it easy to meet colleagues, relax after sessions, or continue discussions throughout the conference.
      links:
        - label: Book your stay here
          url: https://book.passkey.com/go/VLDBConference
        - label: Virtual Tour
          url: https://visitingmedia.com/tt8/?ttid=the-westin-boston-seaport#/360?group=0&tour=0
    - title: The Seaport District
      paragraphs:
        - The Westin is located in Boston's Seaport District, one of the city's most dynamic waterfront neighborhoods. The area is known for its restaurants, innovation hubs, and scenic harbor views.
        - Many attractions are within walking distance of the hotel, including the Boston HarborWalk, the Institute of Contemporary Art, and the Boston Tea Party Ships & Museum. Visitors can also explore historic Boston through the nearby Freedom Trail or take the Old Town Trolley Tour, which stops right outside the hotel.
      map_embed_url: https://www.openstreetmap.org/export/embed.html?bbox=-71.05389%2C42.34086%2C-71.03389%2C42.35086&layer=mapnik&marker=42.34586%2C-71.04389
      links:
        - label: Map of Seaport District
          url: https://maps.app.goo.gl/8EJLd5h5T9egbLgz7
    - title: Transportation
      paragraphs:
        - The hotel is located about 10 minutes (2 miles) from Boston Logan International Airport (BOS), which offers direct flights to many domestic and international destinations. Taxi or uber trips between the airport and the hotel typically cost $15-$25.
        - Boston is also easily accessible from other major cities in the Northeast, including New York City (about 2.5 hours by train or car).
        - Parking at the hotel is available for attendees traveling by car, with a special fee as well.

shadow_pc:
  content: |
    # VLDB 2026 Shadow PC

    We are introducing a Shadow PC to VLDB, which will follow the reviewing cycles of VLDB 2026 (Vol 19) submissions. 

    ## What is Shadow PC?

    VLDB is organizing a shadow program committee for the VLDB 2026 conference.
    Shadow PC reviews will have no effect on the decisions of the VLDB PC, but Shadow PC members will be able to see and review the submitted VLDB papers if the authors of those papers opt in to be part of the Shadow PC paper pool at submission time.
    Shadow PC is educational.
    The goal is to give reviewing experience on real submissions to a top data management conference to the new members of the data management community.

    The regular VLDB PC reviews / comments will remain invisible to the Shadow PC.
    The reviews written by the Shadow PC will only be visible to the shadow PC members and eventually to the authors.

    The VLDB conflict-of-interest rules will apply to shadow PC as well, and Shadow PC members will be required to comply with ethical code of conduct.

    ## Why join a shadow PC?

    The VLDB Shadow PC is a great opportunity for everyone who are new to the data management community (from junior researchers to senior ones who may have started working across communities) to gain experience with the review and program committee process.

    Besides the recognition of being selected to Shadow PC, serving in VLDB Shadow PC is worthwhile for a number of reasons:

    - Getting to know how an academic PC operates in the data management community;
    - Seeing how other reviewers judge the same papers that you review;
    - Getting to see both strong and weak papers at the submission stage;
    - Discovering what it takes to publish a paper in a top data management venue such as VLDB;
    - Having a chance to read top-notch papers in your area of expertise before they are published;
    - Getting to know other researchers who are also selected to the Shadow PC.

    ## How does the shadow PC work?

    Shadow PC members must commit themselves to writing their own detailed and rigorous reviews for papers assigned to them by the allotted deadlines.
    This timely review commitment is essential to the good functioning of the Shadow PC.
    Candidates who might be unable to fulfil their reviewing duties should refrain from applying. 

    To keep the load feasible, the Shadow PC will review one paper submitted to VLDB every other month starting from June.
    The paper pools and review timelines will mimic the VLDB 2026 review cycles and timelines, and we will be using CMT as the reviewing platform like VLDB.

    The Shadow PC will receive feedback on their reviews by the Shadow PC chairs and have a chance to learn from the reviews of other Shadow PC members.

    Here is the more detailed timeline:

    - March 1, 2025: Call for Shadow PC deadline
    - March 13, 2025: Finalize Shadow PC
    - May 2025: Online intro meeting with PC
    - June 2025: 1st round review --- paper pool April-May submissions 
    - July 2025: Online feedback meeting after first round
    - August 2025: 2nd round review --- paper pool June-July submissions
    - September 2025: An in-person session during VLDB 2025 on Shadow PC - feedback & lessons-learned so far
    - October 2025: 3rd round review --- paper pool August-September submissions
    - December 2025: 4th round review --- paper pool October-November submissions
    - February 2026: 5th round review --- paper pool December-January submissions
    - April 2026: 6th / final round review --- paper pool February-March submissions
    - May 2026: Final feedback meeting, online
    - August/September 2026: In-person session at VLDB 2026 with Shadow PC 2026 and Shadow PC 2027

    (Tentative) Timeline for reviewing months:

    - Paper assignments by the 1st of the month
    - Reviews due by 28th of the month 
    - Online discussions to reach the final decision (accept/revision/reject) for the paper till the 13th of the following month

    ## How to become a shadow PC member? 

    For this instance of VLDB Shadow PC, our target audience are the people who are involved in the data management community through their research and wish to get some reviewing experience in this community but haven't had a data management conference reviewing experience yet.
    Therefore, we are looking for candidates that (1) have already published at a data management venue or an affiliated workshop and (2) haven't yet served in the program committee of any data management venue.

    You will need to submit your application at [forms.office.com/e/XYihKj4UKq](https://forms.office.com/e/XYihKj4UKq) by March 1st, 2025 (AoE).
    The required information for the application can be found on the form. 

    ## Contact

    For any further information, please contact the shadow PC chairs: vldb2026_shadowpc_chairs@o365team.itu.dk. 

    - Pınar Tözün (IT University of Copenhagen, Denmark)
    - Tianzheng Wang (Simon Fraser University, Canada)
    - Zsolt István (TU Darmstadt, Germany)

